<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coach Dominion</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080b10;
      --panel: #131a24;
      --line: #2a3648;
      --text: #f4f7fb;
      --muted: #9aa8b8;
      --green: #39d692;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 10% 0%, rgba(57,214,146,.12), transparent 28%),
        var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      background: linear-gradient(180deg, #151d28, #10161f);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 28px;
    }
    .kicker {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
    }
    h1 {
      margin: 8px 0;
      font-size: clamp(42px, 8vw, 72px);
      letter-spacing: -.06em;
      line-height: .95;
    }
    p { color: var(--muted); font-size: 18px; }
    .status {
      display: inline-flex;
      margin-top: 18px;
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid rgba(57,214,146,.35);
      background: rgba(57,214,146,.1);
      color: var(--green);
      font-weight: 900;
    }
  </style>
</head>
<body>
  <main>
    <div class="kicker">COACH DOMINION · CLEAN FOUNDATION</div>
    <h1>Deployment pipeline operational.</h1>
    <p>No npm, no package manager, and no build step. This confirms GitHub → Vercel before we add authentication and product modules.</p>
    <div class="status">SYSTEM GREEN</div>
  </main>
</body>
</html>
