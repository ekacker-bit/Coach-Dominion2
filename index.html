<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Coach Dominion — Login</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="auth">
    <section class="card auth-card">
      <div class="kicker">COACH DOMINION</div>
      <h1>Enter the War Room</h1>
      <p class="muted">Secure email magic-link access.</p>
      <form id="login-form">
        <label>Email
          <input id="email" type="email" required placeholder="you@example.com">
        </label>
        <button id="submit" type="submit">Send Magic Link</button>
      </form>
      <p id="status" class="status"></p>
    </section>
  </div>

<script>
let client;

async function getClient() {
  if (client) return client;
  const response = await fetch("/api/config");
  const config = await response.json();
  if (!config.ok) throw new Error(config.error || "Configuration unavailable.");
  client = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
  return client;
}

(async () => {
  try {
    const supabase = await getClient();
    const { data } = await supabase.auth.getSession();
    if (data.session) window.location.replace("/app");
  } catch (error) {
    document.getElementById("status").textContent = error.message;
  }
})();

document.getElementById("login-form").addEventListener("submit", async (event) => {
  event.preventDefault();
  const button = document.getElementById("submit");
  const status = document.getElementById("status");
  button.disabled = true;
  button.textContent = "Sending…";
  status.textContent = "";

  try {
    const supabase = await getClient();
    const email = document.getElementById("email").value.trim();
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + "/app" }
    });
    if (error) throw error;
    status.textContent = "Magic link sent. Check your email.";
  } catch (error) {
    status.textContent = error.message;
  } finally {
    button.disabled = false;
    button.textContent = "Send Magic Link";
  }
});
</script>
</body>
</html>
