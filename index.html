<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Coach Dominion — Login</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="auth">
    <section class="card auth-card">
      <div class="kicker">COACH DOMINION</div>
      <h1>Enter the War Room</h1>
      <p class="muted">Use your password for immediate access. Magic link remains available as a fallback.</p>

      <form id="password-form">
        <label>Email
          <input id="password-email" type="email" autocomplete="email" required placeholder="you@example.com">
        </label>
        <label>Password
          <input id="password" type="password" autocomplete="current-password" minlength="6" required placeholder="Your password">
        </label>
        <button id="password-submit" type="submit">Sign in with Password</button>
      </form>

      <p class="muted" style="margin-top:18px">—or—</p>

      <form id="magic-link-form">
        <label>Email
          <input id="magic-email" type="email" autocomplete="email" required placeholder="you@example.com">
        </label>
        <button id="magic-submit" class="ghost" type="submit">Send Magic Link</button>
      </form>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </section>
  </div>

<script>
let client;

async function getClient() {
  if (client) return client;
  const response = await fetch("/api/config");
  const config = await response.json();
  if (!config.ok) throw new Error(config.error || "Configuration unavailable.");
  client = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
  return client;
}

function setStatus(message) {
  document.getElementById("status").textContent = message || "";
}

function setButtonState(button, isLoading, loadingText, idleText) {
  button.disabled = isLoading;
  button.textContent = isLoading ? loadingText : idleText;
}

(async () => {
  try {
    const supabase = await getClient();
    const { data, error } = await supabase.auth.getSession();
    if (error) throw error;
    if (data.session) window.location.replace("/app");
  } catch (error) {
    setStatus(error.message);
  }
})();

document.getElementById("password-form").addEventListener("submit", async (event) => {
  event.preventDefault();
  const button = document.getElementById("password-submit");
  setButtonState(button, true, "Signing in…", "Sign in with Password");
  setStatus("");

  try {
    const supabase = await getClient();
    const email = document.getElementById("password-email").value.trim();
    const password = document.getElementById("password").value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) throw error;
    window.location.replace("/app");
  } catch (error) {
    setStatus(error.message);
  } finally {
    setButtonState(button, false, "Signing in…", "Sign in with Password");
  }
});

document.getElementById("magic-link-form").addEventListener("submit", async (event) => {
  event.preventDefault();
  const button = document.getElementById("magic-submit");
  setButtonState(button, true, "Sending…", "Send Magic Link");
  setStatus("");

  try {
    const supabase = await getClient();
    const email = document.getElementById("magic-email").value.trim();
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + "/app" }
    });
    if (error) throw error;
    setStatus("Magic link sent. Check your email.");
  } catch (error) {
    setStatus(error.message);
  } finally {
    setButtonState(button, false, "Sending…", "Send Magic Link");
  }
});
</script>
</body>
</html>
