<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Coach Dominion — War Room</title>
  <link rel="stylesheet" href="/assets/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <main>
    <div class="topbar">
      <div>
        <div class="kicker">CLOSED ALPHA</div>
        <h1>War Room</h1>
      </div>
      <button id="logout" class="ghost">Sign out</button>
    </div>
    <p class="muted" id="identity">Verifying session…</p>

    <section class="grid">
      <article class="card">
        <div class="kicker">PRIMARY MISSION</div>
        <h2>Execute the prescribed session exactly.</h2>
        <p class="muted">No unauthorized volume.</p>
      </article>
      <article class="card">
        <div class="kicker">READINESS</div>
        <div class="metric green">GREEN</div>
        <p>Sleep 7.3 h · RHR 51 · Soreness 3/10</p>
      </article>
      <article class="card">
        <div class="kicker">NUTRITION</div>
        <div class="metric">2350</div>
        <p>175 g protein · 30 g fiber</p>
      </article>
    </section>
  </main>

<script>
let client;

async function getClient() {
  if (client) return client;
  const response = await fetch("/api/config");
  const config = await response.json();
  if (!config.ok) throw new Error(config.error || "Configuration unavailable.");
  client = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
  return client;
}

(async () => {
  try {
    const supabase = await getClient();
    const { data, error } = await supabase.auth.getSession();
    if (error) throw error;
    if (!data.session) {
      window.location.replace("/");
      return;
    }
    document.getElementById("identity").textContent =
      "Signed in as " + data.session.user.email;
  } catch (error) {
    document.getElementById("identity").textContent = error.message;
  }
})();

document.getElementById("logout").addEventListener("click", async () => {
  const supabase = await getClient();
  await supabase.auth.signOut();
  window.location.replace("/");
});
</script>
</body>
</html>
